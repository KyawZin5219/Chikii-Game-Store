<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <title>Chikii Game Store - MLBB</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo" onclick="goTo('home')">Chikii<span class="spin-a">Λ</span> STORE</div>
    </header>

<div class="container" id="content-area">

    <div id="home-view" class="view-section">
        <div style="width: 90%; max-width: 340px; margin: 0 auto 12px auto; display: flex; justify-content: flex-end;">
            <div onclick="goTo('history')" style="background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); padding: 8px 16px; border-radius: 12px; color: #fff; font-weight: 800; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px;">
                <i class="fas fa-history" style="color: var(--accent);"></i> Order History
            </div>
        </div>
        
        <div class="sec-title">Popular Game</div>
        <div class="game-grid">
            <div class="game-card gm-mlbb" onclick="openGame('mlbb_global', 'Mobile Legends')">
                <div class="game-img-box"><img src="https://fls-a09dce4a-8b00-44f8-aa66-c91c285e16f1.laravel.cloud/games/logo/01KAAXVNSRK8Q84Q3ASY2FM8T6.webp" class="game-img"></div>
                <div class="game-info">Mobile Legends</div>
            </div>
        </div>
    </div>

    <div id="product-view" class="view-section" style="display:none;">
        <div class="back-nav" onclick="goTo('home')"><i class="fas fa-chevron-left"></i> Back</div>
        <h2 id="view-title">Mobile Legends</h2>

        <div id="region-selector" class="region-bar">
            <div class="region-tab active" onclick="changeRegion('mlbb_global', this)">Normal 🇲🇲</div>
            <div class="region-tab" onclick="changeRegion('mlbb_my', this)">MY 🇲🇾</div>
            <div class="region-tab" onclick="changeRegion('mlbb_sg', this)">SG 🇸🇬</div>
            <div class="region-tab" onclick="changeRegion('mlbb_ph', this)">PH 🇵🇭</div>
        </div>

        <div class="id-card">
            <div class="id-header" style="margin-bottom: 15px; align-items: center;">
                <span id="id-title-text" style="font-size: 13px; font-weight: bold; color: var(--text-dim);">Enter Player ID</span>
                <span style="background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); padding: 6px 14px; border-radius: 12px; color: #fff; font-size: 13px; cursor: pointer;" onclick="document.getElementById('recent-modal').style.display='flex'">
                    <i class="fas fa-list-ul" style="color: var(--accent);"></i> Recent IDs
                </span>
            </div>

            <div class="input-row" id="p-input-row">
                <input type="text" id="p-id" placeholder="Player ID">
                <input type="text" id="p-zone" placeholder="Zone ID">
            </div>

            <div class="action-row" id="p-action-row">
                <button class="btn-check" onclick="handleCheckID()">VERIFY ID</button>
                <button class="btn-paste" onclick="handlePaste()"><i class="fas fa-paste"></i> Paste</button>
            </div>
            <div id="ign-display"></div>
        </div>

        <div id="diamond-list" class="product-list"></div>
    </div>

    <div id="history-view" class="view-section" style="display:none;">
        <div style="width: 90%; max-width: 360px; margin: 0 auto; padding-bottom: 80px;">
            <div style="display: flex; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
                <div class="back-nav" onclick="goTo('home')" style="margin: 0; padding: 0; font-size: 15px;"><i class="fas fa-chevron-left"></i> Back to Home</div>
            </div>
            <h2 style="color: #fff; font-size: 18px; margin-bottom: 15px;"><i class="fas fa-history" style="color: var(--accent); margin-right: 10px;"></i> Order History</h2>
            <div id="full-history-list"></div>
        </div>
    </div>

</div> 

<div id="checkout-bar" style="display: none;">
    <div class="checkout-close-bar">
        <button class="btn-close-checkout" onclick="closeCheckout()"><i class="fas fa-times"></i> Close</button>
    </div>
    <div class="qty-row">
        <span style="font-size:12px; font-weight:bold; color:var(--text-dim);">Quantity</span>
        <div class="qty-controls">
            <button class="qty-btn" onclick="updateQty(-1)"><i class="fas fa-minus"></i></button>
            <span id="qty-text" style="font-weight:900; color:#fff; width:25px; text-align:center;">1</span>
            <button class="qty-btn" onclick="updateQty(1)"><i class="fas fa-plus"></i></button>
        </div>
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
        <div>
            <div style="font-size:10px; color:var(--text-dim);">Total Price</div>
            <div id="selected-price" style="font-size:16px; font-weight:900; color:#fff;">0 Ks</div>
        </div>
        <button class="btn-buy-now" onclick="initiateBuy()">BUY NOW</button>
    </div>
</div>

<div id="ml-check-modal" style="display:none;" onclick="this.style.display='none'">
    <div class="ml-check-box" onclick="event.stopPropagation()">
        <div id="ml-check-loading">
            <i class="fas fa-circle-notch fa-spin" style="font-size: 30px; color: var(--accent); margin-bottom: 10px;"></i>
            <div style="color: var(--accent); font-size: 13px; font-weight: bold;">Checking ID...</div>
        </div>
        <div id="ml-check-result" style="display: none;">
            <div id="ml-success-name" style="color: #39ff14; font-size: 16px; font-weight: 900; text-shadow: 0 0 10px rgba(57,255,20,0.5);"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="recent-modal" style="display:none;" onclick="if(event.target===this) this.style.display='none'">
    <div class="modal-card" style="padding: 20px;">
        <h3 style="color:#fff; margin-bottom:10px; font-size:16px;">Recent Accounts</h3>
        <div id="recent-list-web" class="recent-list"></div>
        <button class="btn-main" style="margin-top:15px; background:#333;" onclick="document.getElementById('recent-modal').style.display='none'">Close</button>
    </div>
</div>

<nav class="bottom-nav" style="justify-content: space-around; padding: 10px 0;">
    <div class="nav-tab active" onclick="goTo('home')">
        <i class="fas fa-home" style="font-size: 20px;"></i>
        <span style="font-size: 10px; margin-top: 5px;">Home</span>
    </div>
    <div class="nav-tab" onclick="goTo('history')">
        <i class="fas fa-history" style="font-size: 20px;"></i>
        <span style="font-size: 10px; margin-top: 5px;">History</span>
    </div>
</nav>

<script src="app.js"></script>

</body>
</html>
